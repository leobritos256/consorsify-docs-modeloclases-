<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama de clases · Consorsify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e8ecf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 36px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #8b7ff5;
      background: rgba(139,127,245,0.1);
      border: 1px solid rgba(139,127,245,0.22);
      padding: 4px 12px;
      border-radius: 20px;
      width: fit-content;
      margin-bottom: 10px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8b7ff5;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: #e8ecf4;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .chips {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #161b27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      color: #8891aa;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin: 20px 36px;
    }

    .diagram-wrap {
      flex: 1;
      padding: 0 36px 36px;
    }

    .scroll-hint {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #4a5168;
      margin-bottom: 10px;
    }

    #diagram-box {
      width: 100%;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #13171f;
      padding: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    #diagram-box::-webkit-scrollbar { height: 5px; }
    #diagram-box::-webkit-scrollbar-track { background: transparent; }
    #diagram-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    #diagram-box svg {
      display: block;
      min-width: 1300px;
    }

    #diagram-box svg text,
    #diagram-box svg .nodeLabel,
    #diagram-box svg .edgeLabel,
    #diagram-box svg .label,
    #diagram-box svg .classLabel .label {
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 13px !important;
    }

    #diagram-box svg g.classGroup text {
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 13px !important;
    }

    #diagram-box svg .classTitleText {
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 14px !important;
      font-weight: 600 !important;
    }

    #diagram-box svg .edgeTerminals {
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 12px !important;
    }

    footer {
      padding: 14px 36px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-l { font-size: 13px; color: #4a5168; }
    .footer-l strong { color: #6b7590; font-weight: 500; }
    .footer-r { font-size: 12px; color: #4a5168; font-family: monospace; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow"><span class="dot"></span> Modelo de dominio</div>
    <h1>Diagrama de clases · Consorsify</h1>
    <div class="chips">
      <span class="chip">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><rect x=".5" y=".5" width="3.5" height="3.5" rx=".8" fill="currentColor" opacity=".7"/><rect x="5" y=".5" width="3.5" height="3.5" rx=".8" fill="currentColor"/><rect x=".5" y="5" width="3.5" height="3.5" rx=".8" fill="currentColor" opacity=".4"/><rect x="5" y="5" width="3.5" height="3.5" rx=".8" fill="currentColor" opacity=".7"/></svg>
        15 clases
      </span>
      <span class="chip">17 relaciones</span>
    </div>
  </div>

</header>

<div class="divider"></div>

<div class="diagram-wrap">
  <div class="scroll-hint">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5h8M6.5 3.5l2 2-2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Desplazate horizontalmente para ver todas las clases
  </div>
