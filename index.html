<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama de clases · Consorsify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Reset básico para evitar scrolls fantasmas */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e8ecf4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden; /* Evita el corte lateral en Confluence */
    }

    header { padding: 20px 24px; }
    h1 { font-size: 24px; color: #e8ecf4; margin-bottom: 8px; }

    /* Contenedor optimizado para Confluence */
    .diagram-wrap {
      flex: 1;
      width: 100%;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    #diagram-box {
      width: 100%;
      max-width: 100%;
      background: #13171f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 15px;
      /* Permite scroll si el diagrama es muy ancho pero no corta la visualización */
      overflow: auto; 
    }

    /* Ajuste de escala para que el SVG no se corte */
    #diagram-box svg {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%; 
    }

    /* Estilos de fuente mejorados para legibilidad */
    #diagram-box svg text {
      font-family: 'Inter', sans-serif !important;
      fill: #ffffff !important;
    }

    /* Títulos de clase con mayor peso visual */
    .classTitleText {
      font-size: 18px !important;
      font-weight: 600 !important;
      fill: #8b7ff5 !important;
    }

    /* Atributos y métodos */
    .nodeLabel, .label, g.classGroup text {
      font-size: 14px !important;
    }

    /* Ajuste de las líneas de relación */
    .edgeLabel {
      font-size: 12px !important;
      fill: #aab2c8 !important;
    }
  </style>
</head>
<body>

<header>
  <h1>Diagrama de Clases - Consorsify</h1>
</header>

<div class="diagram-wrap">
  <div id="diagram-box">
    <svg id="my-svg" 
         viewBox="0 0 2050 1300" 
         preserveAspectRatio="xMidYMid meet" 
         xmlns="http://www.w3.org/2000/svg">
         
      </svg>
  </div>
</div>

</body>
</html>
