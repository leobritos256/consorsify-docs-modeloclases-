<style>
  /* Contenedor flexible para Confluence */
  #cd5 {
    width: 100%;
    overflow: hidden; /* Evita scrolls dobles */
    background: #13171f;
    border-radius: 8px;
    padding: 20px;
  }
  
  /* Forzamos que el SVG ocupe el 100% sin cortarse */
  #cd5 svg {
    width: 100% !important;
    height: auto !important;
    max-width: 100%;
    display: block;
  }
</style>

<h2 class="sr-only">Diagrama de clases Consorsify</h2>
<div id="cd5"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  // Configuraciones críticas para legibilidad y tamaño
  fontFamily: '"Inter", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '16px', // Letra más grande y cómoda
    fontFamily: '"Inter", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: '#ffffff',
    primaryColor: '#3C3489',
    primaryTextColor: '#ffffff',
    primaryBorderColor: '#7F77DD',
    // Aumentamos el padding interno de las cajas para la nueva letra
    nodePadding: 20, 
  },
  // Ajustes de flujo para que no se amontonen las clases
  class: {
    useMaxWidth: true,
    padding: 30
  },
  // Esto ayuda a que el motor de renderizado asigne más espacio
  flowchart: { 
    htmlLabels: true,
    curve: 'basis'
  }
});

const diagram = `classDiagram
  direction TB

  class Usuario {
    +UUID id
    +String email
    +String password
    +String nombre
    +String apellido
    +Enum rol
    +String telefono
    +String avatar
    +login(email, password)
    +register(data)
    +updateProfile(data)
    +updateNotificationPreferences(prefs)
  }

  class Notificacion {
    +UUID id
    +String titulo
    +String mensaje
    +Enum tipo
    +Boolean leida
    +String link
    +create(usuarioId, data)
    +markAsRead(id)
    +clearAll(usuarioId)
  }

  class Consorcio {
    +UUID id
    +String nombre
    +String direccion
    +Float tasaInteres
    +DateTime fechaCreacion
    +addUnit(unidadData)
    +updateInterestRate(tasa)
    +getGeneralStats(periodo)
    +calculateMonthlyExpenses(periodo)
  }

  class Unidad {
    +UUID id
    +String numero
    +String piso
    +Float coeficiente
    +calculateCurrentDebt()
    +assignOwner(usuarioId)
    +assignTenant(usuarioId)
    +getHistory()
  }

  class Comprobante {
    +UUID id
    +String descripcion
    +Float monto
    +String categoria
    +Enum tipo
    +DateTime fecha
    +createVoucher(data)
    +listByPeriod(consorcioId, periodo)
  }

  class Expensa {
    +UUID id
    +String periodo
    +Float montoTotal
    +Enum estado
    +calculatePeriodTotal(consId, periodo)
    +generateBreakdown()
  }

  class Liquidacion {
    +UUID id
    +String periodo
    +Float expensasComunes
    +Float expensasExtraordinarias
    +Float deudaAnterior
    +Float interes
    +Float total
    +Float montoPagado
    +DateTime fechaVencimiento
    +Enum estado
    +generateMass(consId, periodo, fechaVenc)
    +updateStatus()
    +calculateInterests()
  }

  class Pago {
    +UUID id
    +Float monto
    +Enum metodoPago
    +String nroRecibo
    +String adjunto
    +Enum estado
    +reportPayment(data)
    +approve(id)
    +cancel(motivo)
    +generateReceiptNumber()
  }

  class Reclamo {
    +UUID id
    +String asunto
    +String descripcion
    +Enum estado
    +Enum prioridad
    +create(data)
    +changeStatus(nuevoEstado)
    +assignPriority(nivel)
  }

  class Comentario {
    +UUID id
    +String contenido
    +UUID usuarioId
    +String nombreUsuario
    +post(reclamoId, contenido)
    +delete(id)
  }

  class Anuncio {
    +UUID id
    +String titulo
    +String contenido
    +DateTime fechaEvento
    +publish(consId, data)
  }

  class Propuesta {
    +UUID id
    +String titulo
    +String descripcion
    +Float monto
    +DateTime fechaCierre
    +Enum estado
    +registerVote(usuarioId, valor)
    +closeVoting()
    +calculateResults()
  }

  class Voto {
    +UUID id
    +Boolean valor
    +cast(usuarioId, valor)
  }

  class Presupuesto {
    +UUID id
    +String proveedor
    +String descripcion
    +Float monto
    +String adjunto
    +upload(propuestaId, data)
  }

  Consorcio "1" --> "0..*" Unidad : contiene
  Consorcio "1" --> "0..*" Comprobante : registra
  Consorcio "1" --> "0..*" Expensa : resume
  Consorcio "1" --> "0..*" Reclamo : gestiona
  Consorcio "1" --> "0..*" Anuncio : publica
  Consorcio "1" --> "0..*" Propuesta : propone

  Usuario "1" --> "0..*" Unidad : propietario/inquilino
  Usuario "1" --> "0..*" Notificacion : recibe
  Usuario "1" --> "0..*" Voto : emite
  Usuario "1" --> "0..*" Comentario : escribe

  Unidad "1" --> "0..*" Liquidacion : genera
  Unidad "1" --> "0..*" Pago : registra
  Unidad "1" --> "0..*" Reclamo : origina

  Liquidacion "1" --> "0..*" Pago : incluye

  Reclamo "1" --> "0..*" Comentario : tiene

  Propuesta "1" --> "0..*" Presupuesto : adjunta
  Propuesta "1" --> "0..*" Voto : recibe
`;

try {
  const { svg } = await mermaid.render('cd5-svg', diagram);
  const container = document.getElementById('cd5');
  container.innerHTML = svg;

  // Ajuste post-renderizado para bordes redondeados y limpieza visual
  document.querySelectorAll('#cd5 svg .node rect').forEach(rect => {
    rect.setAttribute('rx', '10');
    rect.setAttribute('ry', '10');
  });

} catch (error) {
  console.error("Error renderizando Mermaid:", error);
}
</script>
